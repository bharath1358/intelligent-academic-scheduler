<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <title>Staff-Subject-Class Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
      body {
        min-height: 100vh;
        font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        margin: 0;
        padding: 0;
        position: relative;
      }
  background: linear-gradient(135deg, #181818 70%, #2c3e50 100%);
      .bg-blend {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(30, 30, 30, 0.55);
        z-index: 0;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .card.shadow {
        background: rgba(255,255,255,0.18);
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        border: 1.5px solid rgba(255,255,255,0.35);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 38px 32px 28px 32px;
        margin-top: 40px;
      }
      .card-body h2, .card-body h3 {
        color: #fff;
        font-weight: 700;
        letter-spacing: 1px;
        text-shadow: 0 2px 8px #222;
      }
      .table th, .table td {
        vertical-align: middle;
        text-align: center;
        background: rgba(255,255,255,0.85);
      }
      .btn-danger, .btn-secondary {
        border-radius: 8px;
        font-weight: 500;
      }
    </style>
</head>
<body style="background: url('/static/view.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; margin: 0; padding: 0; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;">
  <div class="bg-blend" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); pointer-events: none;"></div>
  <div class="title-bar" style="position: absolute; top: 0; left: 0; width: 100vw; background: linear-gradient(90deg, #434343 60%, #1e3c72 100%); color: #fff; font-size: 2.2em; font-weight: 700; text-align: center; padding: 22px 0 18px 0; letter-spacing: 2px; text-shadow: 0 2px 12px #111, 0 0 8px #1e3c72; z-index: 2; box-shadow: 0 2px 12px rgba(30,60,114,0.18);">TIMETABLE SYSTEM</div>
  <div class="bg-blend" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); pointer-events: none;"></div>
<div class="bg-blend"></div>
<div class="bg-blend"></div>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(90deg, #181818 60%, #222 100%);">
  <div class="container">
    <a class="navbar-brand mx-auto text-center w-100" style="font-size:2rem; font-weight:bold; letter-spacing:2px; text-shadow: 1px 1px 6px #2c3e50; color:#fff;" href="/dashboard">TIMETABLE SYSTEM</a>
  </div>
</nav>
<div class="container mt-5 pt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow mb-4">
        <div class="card-body">
          <h2 class="mb-4 text-center">Staff-Subject-Class Data</h2>
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Staff</label>
              <input type="text" name="staff" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Subject</label>
              <input type="text" name="subject" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Class</label>
              <input type="text" name="class_name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Periods per week</label>
              <input type="number" name="periods_per_week" min="1" max="10" value="5" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Save Data</button>
          </form>
        </div>
      </div>
      <div class="card shadow">
        <div class="card-body">
          <h3 class="mb-3">Existing Data</h3>
          <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Staff</th>
                  <th>Subject</th>
                  <th>Class</th>
                  <th>Periods/week</th>
                  <!-- <th>Action</th> -->
                </tr>
              </thead>
              <tbody>
                {% for row in data %}
                <tr>
                  <td>{{ row[0] }}</td>
                  <td>{{ row[1] }}</td>
                  <td>{{ row[2] }}</td>
                  <td>{{ row[3] }}</td>
                  <td>{{ row[4] }}</td>
                  <!-- <td>
                    <form action="/delete_mapping/{{ row[0] }}" method="post" style="display:inline;">
                      <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this entry?')">Delete</button>
                    </form>
                  </td> -->
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
          <a href="/dashboard" class="btn btn-secondary mt-3">⬅️ Back to Dashboard</a>
          {% if session['role'] == 'admin' %}
          <hr>
          <form action="/delete_all_mappings" method="post" onsubmit="return confirm('Are you sure you want to delete ALL data?');">
            <button type="submit" class="btn btn-outline-danger w-100">🗑 Delete All Data</button>
          </form>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
