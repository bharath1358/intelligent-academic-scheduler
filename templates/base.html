<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Timetable System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: url('{{ url_for('static', filename='dashboard-bg.jpg') }}') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        .background-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            backdrop-filter: blur(6px);
            background: rgba(0,0,0,0.2);
        }
        .content {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="blur-bg"></div>
    <div class="main-content">
        <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(90deg, #181818 60%, #222 100%);">
            <div class="container">
                <a class="navbar-brand" href="/dashboard" style="font-size:2rem; font-weight:bold; letter-spacing:2px; text-shadow: 1px 1px 6px #fff, 0 0 8px #2c3e50; color:#fff;">TIMETABLE SYSTEM</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        {% if session.get('user') %}
                        <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>
        <div class="center-panel">
            <div class="panel-box">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
