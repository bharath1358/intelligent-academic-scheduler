<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body style="background: url('/static/library-bg.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; margin: 0; padding: 0; font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;">
  <div class="title-bar" style="position: absolute; top: 0; left: 0; width: 100vw; background: linear-gradient(90deg, #434343 60%, #1e3c72 100%); color: #fff; font-size: 2.2em; font-weight: 700; text-align: center; padding: 22px 0 18px 0; letter-spacing: 2px; text-shadow: 0 2px 12px #111, 0 0 8px #1e3c72; z-index: 2; box-shadow: 0 2px 12px rgba(30,60,114,0.18);">TIMETABLE SYSTEM</div>
  <div class="bg-blend" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); pointer-events: none;"></div>
  <div class="title-bar" style="position: absolute; top: 0; left: 0; width: 100vw; background: linear-gradient(90deg, #434343 60%, #1e3c72 100%); color: #fff; font-size: 2.2em; font-weight: 700; text-align: center; padding: 22px 0 18px 0; letter-spacing: 2px; text-shadow: 0 2px 12px #111, 0 0 8px #1e3c72; z-index: 2; box-shadow: 0 2px 12px rgba(30,60,114,0.18);">TIMETABLE SYSTEM</div>
  <div class="form-container" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1;">
    <form class="login-form" method="post" style="background: rgba(255,255,255,0.18); border-radius: 22px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 38px 32px 28px 32px; width: 340px; max-width: 90vw; display: flex; flex-direction: column; gap: 18px; border: 1.5px solid rgba(255,255,255,0.35); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: relative;">
      <h2 style="font-size: 2em; font-weight: 700; color: #fff; margin-bottom: 8px; letter-spacing: 1px; text-shadow: 0 2px 8px #222; text-align: center;">Register</h2>
      <input type="text" name="username" placeholder="Username" required style="padding: 12px 14px; border-radius: 8px; border: 1px solid #bdbdbd; font-size: 1em; background: rgba(255,255,255,0.85); margin-bottom: 8px; transition: border 0.2s;">
      <input type="email" name="gmail" placeholder="Gmail" required pattern="[a-zA-Z0-9._%+-]+@gmail\.com" style="padding: 12px 14px; border-radius: 8px; border: 1px solid #bdbdbd; font-size: 1em; background: rgba(255,255,255,0.85); margin-bottom: 8px; transition: border 0.2s;">
      <div style="position: relative;">
        <input id="password" type="password" name="password" placeholder="Password" required style="padding: 12px 38px 12px 14px; border-radius: 8px; border: 1px solid #bdbdbd; font-size: 1em; background: rgba(255,255,255,0.85); margin-bottom: 8px; width: 100%; transition: border 0.2s;">
        <span onclick="togglePassword('password', 'eye1')" style="position: absolute; top: 50%; right: 12px; transform: translateY(-50%); cursor: pointer; color: #1e3c72; font-size: 1.2em;">
          <i id="eye1" class="bi bi-eye-slash"></i>
        </span>
      </div>
      <div style="position: relative;">
        <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm Password" required style="padding: 12px 38px 12px 14px; border-radius: 8px; border: 1px solid #bdbdbd; font-size: 1em; background: rgba(255,255,255,0.85); margin-bottom: 8px; width: 100%; transition: border 0.2s;">
        <span onclick="togglePassword('confirm_password', 'eye2')" style="position: absolute; top: 50%; right: 12px; transform: translateY(-50%); cursor: pointer; color: #1e3c72; font-size: 1.2em;">
          <i id="eye2" class="bi bi-eye-slash"></i>
        </span>
      </div>
      <button type="submit" style="background: linear-gradient(90deg, #434343 60%, #1e3c72 100%); color: #fff; border: none; border-radius: 8px; padding: 12px 0; font-size: 1.1em; font-weight: 500; cursor: pointer; box-shadow: 0 2px 8px rgba(30,60,114,0.18); transition: background 0.2s;">Register</button>
      <a class="alt-link" href="/login" style="text-align: center; margin-top: 10px; color: #1e3c72; text-decoration: underline; font-size: 0.98em; transition: color 0.2s;">Already have an account? Login</a>
    </form>
  </div>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassword(inputId, eyeId) {
      const input = document.getElementById(inputId);
      const eye = document.getElementById(eyeId);
      if (input.type === 'password') {
        input.type = 'text';
        eye.classList.remove('bi-eye-slash');
        eye.classList.add('bi-eye');
      } else {
        input.type = 'password';
        eye.classList.remove('bi-eye');
        eye.classList.add('bi-eye-slash');
      }
    }
  </script>
</body>
</html>
