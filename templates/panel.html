<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <title>College Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
      .card.shadow {
        background: rgba(255,255,255,0.18);
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        border: 1.5px solid rgba(255,255,255,0.35);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 38px 32px 28px 32px;
        margin-top: 40px;
      }
      .card-body h2 {
        color: #fff;
        font-size: 2em;
        font-weight: 700;
        letter-spacing: 1px;
        text-shadow: 0 2px 8px #222;
        margin-bottom: 12px;
      }
      .list-group-item {
        background: rgba(255,255,255,0.65);
        border: none;
        border-radius: 10px !important;
        margin-bottom: 10px;
        transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 8px rgba(30,60,114,0.08);
      }
      .list-group-item-action:hover, .list-group-item-action:focus {
        background: linear-gradient(90deg, #434343 60%, #1e3c72 100%);
        color: #fff;
        box-shadow: 0 4px 16px rgba(30,60,114,0.18);
      }
      body {
        background: url('/static/clg.webp') no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
        font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
        margin: 0;
        padding: 0;
        position: relative;
      }
      .bg-blur {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        pointer-events: none;
      }
      .bg-blend {
        position: fixed;
      }
    </style>
</head>
<body>
<div class="title-bar" style="position: absolute; top: 0; left: 0; width: 100vw; background: linear-gradient(90deg, #434343 60%, #1e3c72 100%); color: #fff; font-size: 2.2em; font-weight: 700; text-align: center; padding: 22px 0 18px 0; letter-spacing: 2px; text-shadow: 0 2px 12px #111, 0 0 8px #1e3c72; z-index: 2; box-shadow: 0 2px 12px rgba(30,60,114,0.18);">TIMETABLE SYSTEM</div>
<div class="bg-blur"></div>
<div class="bg-blend"></div>
<div class="bg-blend"></div>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(90deg, #181818 60%, #222 100%);">
  <div class="container">
    <a class="navbar-brand mx-auto text-center w-100" style="font-size:2rem; font-weight:bold; letter-spacing:2px; text-shadow: 1px 1px 6px #2c3e50; color:#fff;" href="/dashboard">TIMETABLE SYSTEM</a>
  </div>
</nav>
<div class="container mt-5 pt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="mb-4 text-center">College Timetable</h2>
          <form action="/generate_college_timetable" method="post" class="mb-3">
            <button type="submit" class="btn btn-primary w-100">Generate College Timetable</button>
          </form>
          <hr>
          <div class="list-group">
            <a href="/assign_staff_subject" class="list-group-item list-group-item-action">Assign Staff/Subject/Class</a>
            <a href="/generate_college_timetable" class="list-group-item list-group-item-action">Generate College Timetable</a>
            <a href="/view_timetable" class="list-group-item list-group-item-action">View Generated Timetable</a>
            <a href="/dashboard" class="list-group-item list-group-item-action">Back to Dashboard</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
